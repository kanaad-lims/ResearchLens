<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research Lens</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #c8f04e;
      --accent2:   #4ef0c8;
      --muted:     #3a3a50;
      --text:      #e8e8f0;
      --text-dim:  #7070a0;
      --card-bg:   #13131c;
      --error:     #f04e6a;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 60px 0;
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(52px, 7vw, 96px);
      letter-spacing: 2px;
      line-height: 1;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 12px;
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 60px 80px;
    }

    /* ── SEARCH PANEL ── */
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 40px;
      margin-bottom: 48px;
      position: relative;
      overflow: hidden;
    }

    .search-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .search-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .search-input-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    textarea#query {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      padding: 14px 18px;
      resize: none;
      height: 68px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea#query::placeholder { color: var(--text-dim); }
    textarea#query:focus { border-color: var(--accent); }

    /* ── PARAMS ROW ── */
    .params-row {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .param-group label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .param-group input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 10px 14px;
      width: 110px;
      outline: none;
      transition: border-color 0.2s;
    }

    .param-group input[type="number"]:focus { border-color: var(--accent2); }

    /* ── SEARCH BUTTON ── */
    #searchBtn {
      margin-left: auto;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 3px;
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 2px;
      padding: 12px 36px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      align-self: flex-end;
    }

    #searchBtn:hover { background: #d8ff5e; transform: translateY(-1px); }
    #searchBtn:active { transform: translateY(0); }
    #searchBtn:disabled { background: var(--muted); color: var(--text-dim); cursor: not-allowed; transform: none; }

    /* ── WARNING / ERROR BANNER ── */
    .banner {
      display: none;
      padding: 12px 18px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      border-left: 3px solid;
    }

    .banner.warn  { background: #1a1a0a; border-color: var(--accent); color: var(--accent); }
    .banner.error { background: #1a0a0f; border-color: var(--error);  color: var(--error);  }
    .banner.show  { display: block; }

    /* ── LOADING ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 60px 0;
    }

    #loading.show { display: flex; }

    .loader-line {
      width: 240px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loader-line::after {
      content: '';
      position: absolute;
      left: -60%;
      top: 0;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: sweep 1.2s ease-in-out infinite;
    }

    @keyframes sweep {
      0%   { left: -60%; }
      100% { left: 120%; }
    }

    .loader-text {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── RESULTS HEADER ── */
    #resultsHeader {
      display: none;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }

    #resultsHeader.show { display: flex; }

    .results-title {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
    }

    .results-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent2);
      letter-spacing: 2px;
    }

    .enhanced-query-pill {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 12px;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── PAPER CARDS ── */
    #results {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .paper-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 32px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .paper-card:hover {
      border-color: var(--muted);
      transform: translateY(-2px);
    }

    .paper-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 4px 0 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .paper-card:hover::before { opacity: 1; }

    .card-index {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-title {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .card-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .card-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent2);
      letter-spacing: 1px;
    }

    .card-abstract {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 18px;
      transition: all 0.3s;
    }

    .card-abstract.expanded {
      -webkit-line-clamp: unset;
    }

    .card-footer {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-link {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-link:hover { background: var(--accent); color: var(--bg); }

    .btn-expand {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-expand:hover { border-color: var(--muted); color: var(--text); }

    /* ── EMPTY STATE ── */
    #emptyState {
      display: none;
      text-align: center;
      padding: 80px 0;
    }

    #emptyState.show { display: block; }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-text {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      header, main { padding-left: 24px; padding-right: 24px; }
      .params-row { flex-direction: column; align-items: stretch; }
      #searchBtn { width: 100%; }
      .enhanced-query-pill { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">RESEARCH<span>LENS</span></div>
    <div class="tagline">// Intelligent Paper Retrieval</div>
  </header>

  <main>
    <!-- Search Panel -->
    <div class="search-panel">
      <div class="search-label">// Search Query</div>
      <div class="search-input-wrap">
        <textarea id="query" placeholder="Ask naturally — e.g. 'papers on using transformers for drug discovery' or 'quantum computing optimization 2024'"></textarea>
      </div>
      <div class="params-row">
        <div class="param-group">
          <label>Max Fetch</label>
          <input type="number" id="maxFetch" value="20" min="1" max="100"/>
        </div>
        <div class="param-group">
          <label>Top Results</label>
          <input type="number" id="topFetch" value="5" min="1" max="100"/>
        </div>
        <button id="searchBtn">SEARCH</button>
      </div>
    </div>

    <!-- Banners -->
    <div id="warnBanner" class="banner warn"></div>
    <div id="errorBanner" class="banner error"></div>

    <!-- Loading -->
    <div id="loading">
      <div class="loader-line"></div>
      <div class="loader-text">Enhancing query &amp; fetching papers...</div>
    </div>

    <!-- Results Header -->
    <div id="resultsHeader">
      <div class="results-title">RESULTS</div>
      <div class="results-count" id="resultsCount"></div>
      <div class="enhanced-query-pill" id="enhancedQueryPill" title=""></div>
    </div>

    <!-- Paper Cards -->
    <div id="results"></div>

    <!-- Empty State -->
    <div id="emptyState">
      <div class="empty-icon">◎</div>
      <div class="empty-text">No papers found — try a different query</div>
    </div>
  </main>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';

    const queryEl       = document.getElementById('query');
    const maxFetchEl    = document.getElementById('maxFetch');
    const topFetchEl    = document.getElementById('topFetch');
    const searchBtn     = document.getElementById('searchBtn');
    const warnBanner    = document.getElementById('warnBanner');
    const errorBanner   = document.getElementById('errorBanner');
    const loadingEl     = document.getElementById('loading');
    const resultsHeader = document.getElementById('resultsHeader');
    const resultsCount  = document.getElementById('resultsCount');
    const resultsEl     = document.getElementById('results');
    const emptyState    = document.getElementById('emptyState');
    const enhancedPill  = document.getElementById('enhancedQueryPill');

    function clearUI() {
      warnBanner.classList.remove('show');
      errorBanner.classList.remove('show');
      resultsHeader.classList.remove('show');
      emptyState.classList.remove('show');
      resultsEl.innerHTML = '';
    }

    function showError(msg) {
      errorBanner.textContent = '✕  ' + msg;
      errorBanner.classList.add('show');
    }

    function showWarning(msg) {
      warnBanner.textContent = '⚠  ' + msg;
      warnBanner.classList.add('show');
    }

    function setLoading(on) {
      loadingEl.classList.toggle('show', on);
      searchBtn.disabled = on;
      searchBtn.textContent = on ? 'SEARCHING...' : 'SEARCH';
    }

    function renderCards(papers) {
      papers.forEach((paper, i) => {
        const card = document.createElement('div');
        card.className = 'paper-card';
        card.style.animationDelay = `${i * 60}ms`;

        const date = paper.date ? new Date(paper.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';

        card.innerHTML = `
          <div class="card-index">PAPER_${String(i + 1).padStart(2, '0')}</div>
          <div class="card-title">${escHtml(paper.title)}</div>
          <div class="card-meta">
            <span class="card-date">${date}</span>
          </div>
          <div class="card-abstract" id="abs-${i}">${escHtml(paper.abstract)}</div>
          <div class="card-footer">
            <a class="btn-link" href="${escHtml(paper.link)}" target="_blank" rel="noopener">VIEW PAPER ↗</a>
            <button class="btn-expand" onclick="toggleAbstract(${i}, this)">EXPAND</button>
          </div>
        `;

        resultsEl.appendChild(card);
      });
    }

    function toggleAbstract(i, btn) {
      const abs = document.getElementById(`abs-${i}`);
      const expanded = abs.classList.toggle('expanded');
      btn.textContent = expanded ? 'COLLAPSE' : 'EXPAND';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function doSearch() {
      const query    = queryEl.value.trim();
      const maxFetch = parseInt(maxFetchEl.value);
      const topFetch = parseInt(topFetchEl.value);

      if (!query) { showError('Please enter a search query.'); return; }
      if (isNaN(maxFetch) || maxFetch < 1) { showError('Max Fetch must be at least 1.'); return; }
      if (isNaN(topFetch) || topFetch < 1) { showError('Top Results must be at least 1.'); return; }

      // Client-side guard — mirrors the backend validation
      if (topFetch > maxFetch) {
        showWarning(`Top Results (${topFetch}) exceeds Max Fetch (${maxFetch}). Setting Top Results = ${maxFetch}.`);
        topFetchEl.value = maxFetch;
      }

      clearUI();
      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            max_fetch: maxFetch,
            top_fetch: Math.min(topFetch, maxFetch)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || `Server error ${res.status}`);
          return;
        }

        const papers = data.papers || [];

        resultsCount.textContent = `${papers.length} paper${papers.length !== 1 ? 's' : ''} found`;
        enhancedPill.textContent = `query expanded by AI`;
        enhancedPill.title = query;
        resultsHeader.classList.add('show');

        if (papers.length === 0) {
          emptyState.classList.add('show');
        } else {
          renderCards(papers);
        }

      } catch (err) {
        showError('Could not connect to the server. Is it running on port 8000?');
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    searchBtn.addEventListener('click', doSearch);

    queryEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
    });
  </script>
</body>
</html>
